<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C Programming Quiz - Symbiosis Institute of Technology Nagpur</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="quiz-card">
            <!-- College header with logo and name -->
            <header class="header">
                <!-- Placeholder logo image -->
                <img src="C:\Users\asus\Downloads\logo.jpeg"
                     alt="College Logo"
                     class="college-logo">
                <div class="college-info">
                    <h1>Symbiosis Institute of Technology</h1>
                    <h2>Nagpur</h2>
                    <p class="subtitle">C Programming Quiz</p>
                </div>
            </header>

            <!-- Quiz content -->
            <main>
                <!-- Progress indicator -->
                <p id="progressText" class="progress-text">Question 1 of 1</p>

                <!-- Question text -->
                <div id="questionBox" class="question-box">
                    <h3 id="questionText">Question text will appear here</h3>
                </div>

                <!-- Options container -->
                <form id="optionsForm" class="options-form">
                    <div id="optionsContainer">
                        <!-- Options (radio buttons) will be inserted here by JavaScript -->
                    </div>
                </form>

                <!-- Feedback area -->
                <div id="feedback" class="feedback"></div>

                <!-- Controls: score + next button -->
                <div class="controls">
                    <div class="score-display">
                        <span id="scoreText">Score: 0 / 0</span>
                    </div>
                    <button id="nextBtn" class="next-btn" disabled>Next Question</button>
                </div>

                <!-- Final result (hidden at first) -->
                <div id="resultBox" class="result-box hidden">
                    <h3>Quiz Completed!</h3>
                    <p id="finalScoreText"></p>
                    <p id="finalMessageText"></p>
                    <button id="restartBtn" class="restart-btn">Restart Quiz</button>
                </div>
            </main>
        </div>
    </div>

    <!-- Link to external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
